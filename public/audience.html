<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audience - SSS-Goldsprint</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="audience.css?v=1.2">
</head>
<body>
    <div id="targetDistDisplay" class="target-dist">RACE DISTANCE: <span id="targetDistValue">500</span>M</div>

    <div class="track">
        <div class="lane" id="lane1">
            <div class="lane-header">
                <div class="player-name">PLAYER 1</div>
                <div class="stats">
                    <span class="rpm"><span id="p1Rpm">0</span> RPM</span>
                    <span class="speed"><span id="p1Speed">0.0</span> KM/H</span>
                </div>
            </div>
            <div class="progress-container">
                <div class="progress-bar p1-color" id="p1Progress">
                    <span class="dist-label" id="p1DistLabel">0M</span>
                </div>
            </div>
        </div>

        <div class="lane" id="lane2">
            <div class="lane-header">
                <div class="player-name">PLAYER 2</div>
                <div class="stats">
                    <span class="rpm"><span id="p2Rpm">0</span> RPM</span>
                    <span class="speed"><span id="p2Speed">0.0</span> KM/H</span>
                </div>
            </div>
            <div class="progress-container">
                <div class="progress-bar p2-color" id="p2Progress">
                    <span class="dist-label" id="p2DistLabel">0M</span>
                </div>
            </div>
        </div>
    </div>

    <div id="countdownOverlay" class="countdown-overlay hidden">
        <div id="countdownText">3</div>
    </div>

    <div id="winOverlay" class="win-overlay hidden">
        <div class="win-content">
            <h1 id="winnerText">PLAYER 1 WINS!</h1>
            <div class="results-table">
                <div class="result-row gold">
                    <span class="place">1ST</span>
                    <span id="winnerName" class="name">PLAYER 1</span>
                    <span id="winnerTime" class="time">00.00s</span>
                </div>
                <div class="result-row silver">
                    <span class="place">2ND</span>
                    <span id="secondName" class="name">PLAYER 2</span>
                    <span id="secondTime" class="time">00.00s</span>
                </div>
            </div>
        </div>
    </div>

    <div id="bracketOverlay" class="bracket-overlay hidden">
        <h1 id="bracketCategoryTitle">OPEN BRACKET</h1>
        <div class="bracket-screen-layout">
            <div class="bracket-wrapper">
                <svg id="bracketSvg" class="bracket-svg"></svg>
                <div id="audienceBracketContainer" class="audience-bracket-container"></div>
            </div>
            
            <div class="stats-sidebar">
                <h2>FASTEST RACERS</h2>
                <div id="audienceStatsBody" class="stats-body">
                    <!-- Live stats will appear here -->
                </div>
            </div>
        </div>
    </div>

    <div id="championOverlay" class="champion-overlay hidden">
        <div class="champion-layout">
            <div class="champion-header">
                <div class="champion-title">🏆 TOURNAMENT CHAMPION 🏆</div>
                <div id="championName" class="champion-name">WINNER NAME</div>
            </div>
            
            <div class="leaderboard-section">
                <h2>FASTEST TIMES (TOP 3)</h2>
                <div id="leaderboardList" class="leaderboard-list">
                    <!-- Top times here -->
                </div>
            </div>
        </div>
    </div>

    <script src="audience.js?v=1.3"></script>

</body>
</html>
