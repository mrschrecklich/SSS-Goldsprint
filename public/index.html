<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSS-Goldsprint Launcher</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 { color: #ff9800; font-size: 3rem; margin-bottom: 2rem; }
        .links { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; }
        a {
            display: block;
            padding: 30px 50px;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            text-align: center;
            transition: transform 0.2s;
        }
        a:hover { transform: scale(1.05); }
        .admin-link { background-color: #2196F3; }
        .audience-link { background-color: #9C27B0; }
        .stats-link { background-color: #4CAF50; }
    </style>
</head>
<body>
    <h1>SSS-Goldsprint</h1>
    <div class="links">
        <a href="admin.html" class="admin-link">Launch Admin View<br><small style="font-size: 1rem; font-weight: normal">(Mobile / Tablet)</small></a>
        <a href="audience.html" class="audience-link">Launch Audience View<br><small style="font-size: 1rem; font-weight: normal">(Projector / TV)</small></a>
        <a href="stats.html" class="stats-link">Race Statistics<br><small style="font-size: 1rem; font-weight: normal">(Highscores & Search)</small></a>
    </div>
</body>
</html>
