<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSS-Goldsprint Racing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>SSS-Goldsprint</h1>
        
        <div class="race-config">
            <div class="config-item">
                <label for="inputDist">Race Distance (m):</label>
                <input type="number" id="inputDist" value="500" min="10">
            </div>
            <div class="config-item">
                <label for="inputCirc">Wheel Circum. (m):</label>
                <input type="number" id="inputCirc" value="2.1" step="0.01" min="0.1">
            </div>
        </div>

        <div class="race-controls">
            <button id="startBtn">START RACE</button>
            <div id="status">Ready to Race</div>
        </div>

        <div class="track">
            <!-- Player 1 Lane -->
            <div class="lane" id="lane1">
                <div class="lane-info">
                    <span class="player-name">Player 1</span>
                    <span class="stat">RPM: <span id="p1-rpm">0</span></span>
                    <span class="stat">Speed: <span id="p1-speed">0.0</span> km/h</span>
                    <span class="stat">Dist: <span id="p1-dist">0.00</span>m</span>
                </div>
                <div class="progress-bar">
                    <div class="progress" id="p1-progress"></div>
                </div>
            </div>

            <!-- Player 2 Lane -->
            <div class="lane" id="lane2">
                <div class="lane-info">
                    <span class="player-name">Player 2</span>
                    <span class="stat">RPM: <span id="p2-rpm">0</span></span>
                    <span class="stat">Speed: <span id="p2-speed">0.0</span> km/h</span>
                    <span class="stat">Dist: <span id="p2-dist">0.00</span>m</span>
                </div>
                <div class="progress-bar">
                    <div class="progress" id="p2-progress"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="win-modal" class="modal">
        <div class="modal-content">
            <h2 id="winner-text">PLAYER 1 WINS!</h2>
            <button onclick="closeModal()">Close</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
